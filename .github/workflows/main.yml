name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref so the summary always shows the latest pipeline.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect what changed so we only run the relevant sub-workflows.
  # Unmatched jobs below resolve their `if:` to false and show as "Skipped"
  # in this single run, instead of spawning separate workflow runs.
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'

  rust:
    name: Rust
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    uses: ./.github/workflows/rust.yml
